---
driver:
  name: vagrant
  provider: parallels
  customize:
    memory: 1024

transport:
  max_wait_until_ready: 600
  connection_retries: 10
  connection_retry_sleep: 10

provisioner:
  name: chef_infra
  product_name: chef
  product_version: latest
  channel: stable
  chef_license: accept
  deprecations_as_errors: true

verifier:
  name: inspec
  sudo: true

platforms:
  - name: almalinux-8
  - name: almalinux-9
  - name: almalinux-10
  - name: amazonlinux-2023
  - name: centos-stream-9
  - name: centos-stream-10
  - name: debian-12
  - name: debian-13
  - name: ubuntu-22.04
  - name: ubuntu-24.04

suites:
  - name: default
    run_list:
      - recipe[test::default]
    attributes:
      mysql_test:
        version: "8.4"
    verifier:
      inspec_tests:
        - path: test/integration/default
